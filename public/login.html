<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in · wachin.tv</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="login-wrap">
      <div class="login-card">
        <h1>wachin<span>.tv</span></h1>
        <p class="login-sub">Enter your email and we'll send you a sign-in link.</p>

        <form id="login-form">
          <input
            id="email"
            type="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
          <button type="submit" id="submit-btn">Send sign-in link</button>
        </form>

        <p id="login-msg" class="login-msg"></p>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
